<!DOCTYPE html>
<html>
<head>
  <title>Fintwin Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #ecf2ef;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    h2 {
      margin-bottom: 20px;
      color: #1f2937;
    }

    label {
      font-size: 14px;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0 14px;
      border: 1px solid #d6e0da;
      border-radius: 6px;
    }

    input:focus {
      outline: none;
      border-color: #4f8a8b;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #4f8a8b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .goal-buttons button {
      width: auto;
      margin-right: 8px;
      margin-bottom: 10px;
      padding: 6px 10px;
      background: #f1f5f4;
      color: #374151;
      border: 1px solid #d6e0da;
    }

    .goal-buttons button:hover {
      background: #e3ebe8;
    }

    .hidden {
      display: none;
    }

    .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
        margin-bottom: 15px;
        }

    .chip {
        padding: 8px 14px;
        border: 1px solid #d6e0da;
        border-radius: 20px;
        background: #f5f7f6;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
    }

    .chip:hover {
        background: #e6eeea;
    }

    .chip.active {
        background-color: #4f8a8b;
        color: white;
        border-color: #4f8a8b;
    }

  </style>
</head>

<body>

<div class="container">
  <h2>Financial Setup</h2>

  <label>Monthly Income</label>
  <input id="income">

  <label>Monthly Expenses</label>
  <input id="expenses">

  <label>Goal</label>
  <input id="goal" placeholder="e.g. Start a business, retire early, travel...">

  <div class="goal-buttons">
    <button onclick="setGoal('Buy a House')">House</button>
    <button onclick="setGoal('Buy a Car')">Car</button>
    <button onclick="setGoal('Travel')">Travel</button>
    <button onclick="setGoal('Higher Studies')">Study</button>
  </div>

  <label>Target Amount</label>
  <input id="target">

  <label>Savings (optional)</label>
  <input id="savings">

  <label>Investment Amount (optional)</label>
    <input id="investment_amount" oninput="toggleInvestments()">
    <div id="investment_types" class="hidden">
    <label>Select Investment Type</label>

    <div class="chips">
        <div class="chip" onclick="toggleChip(this)">SIP</div>
        <div class="chip" onclick="toggleChip(this)">Stocks</div>
        <div class="chip" onclick="toggleChip(this)">Mutual Funds</div>
        <div class="chip" onclick="toggleChip(this)">Trading</div>
    </div>
    </div>
    
  <button onclick="saveData()">Save</button>
</div>

<script>
const user_id = localStorage.getItem("user_id");

// protect page
if (!user_id) {
  window.location.href = "login.html";
}

// goal buttons
function setGoal(val) {
  document.getElementById("goal").value = val;
}

// show/hide investment types
function toggleInvestments() {
  const amount = document.getElementById("investment_amount").value;
  const section = document.getElementById("investment_types");

  if (amount && parseInt(amount) > 0) {
    section.classList.remove("hidden");
  } else {
    section.classList.add("hidden");
  }
}

function toggleChip(element) {
  element.classList.toggle("active");
}

// save data
function saveData() {
  const income = parseInt(document.getElementById("income").value);
  const expenses = parseInt(document.getElementById("expenses").value);
  const goal = document.getElementById("goal").value;
  const target_amount = parseInt(document.getElementById("target").value);
  const savings = parseInt(document.getElementById("savings").value) || 0;
  const investment_amount = parseInt(document.getElementById("investment_amount").value) || 0;

  const chips = document.querySelectorAll(".chip.active");
  const investment_type = Array.from(chips).map(c => c.innerText).join(", ");

  fetch("http://127.0.0.1:8000/save-financial-data", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user_id,
      income,
      expenses,
      goal,
      target_amount,
      savings,
      investment_type,
      investment_amount
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
  });
}
</script>

</body>
</html>
