<!DOCTYPE html>
<html>
<head>
  <title>AI Money Mentor</title>
</head>
<body>

<h2>AI Money Mentor</h2>


<input id="age" placeholder="Age"><br><br>
<input id="income" placeholder="Monthly Income"><br><br>
<input id="expenses" placeholder="Monthly Expenses"><br><br>
<input id="goal" placeholder="Goal"><br><br>
<input id="target_amount" placeholder="Target Amount"><br><br>
<input id="time" placeholder="Time (months)"><br><br>
<button onclick="analyze()">Analyze</button>

<pre id="result"></pre>

<script>
function analyze() {
  const age = parseInt(document.getElementById("age").value);
  const income = parseInt(document.getElementById("income").value);
  const expenses = parseInt(document.getElementById("expenses").value);
  const goal = document.getElementById("goal").value;
  const target_amount = parseInt(document.getElementById("target_amount").value);
  const time = parseInt(document.getElementById("time").value);

  fetch("http://127.0.0.1:8000/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      age, income, expenses, goal, target_amount, time
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerText =
`Savings: ₹${data.savings}
Health Score: ${data.health_score}

AI Plan:
${data.advice}`;
  });
}
</script>

</body>
</html>
